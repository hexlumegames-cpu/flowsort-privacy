      color: var(--accent2);
      margin-bottom: 10px;
    }

      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    header .meta {
      font-size: 13px;
      color: var(--text2);
    }

    /* ── Language Switcher ── */
    .lang-bar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .lang-bar::-webkit-scrollbar {
      display: none;
    }

    .lang-inner {
      display: flex;
      gap: 8px;
      min-width: max-content;
      justify-content: center;
    }

    .lang-btn {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
      font-family: inherit;
    }

    .lang-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .lang-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Content ── */
    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 28px 24px;
      margin-top: 24px;
    }

    .section h2 {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section h2 .icon {
      font-size: 20px;
    }

    .section p,
    .section li {
      font-size: 14.5px;
      color: var(--text2);
      margin-bottom: 10px;
    }

    .section ul,
    .section ol {
      padding-left: 22px;
    }

    [dir="rtl"] .section ul,
    [dir="rtl"] .section ol {
      padding-left: 0;
      padding-right: 22px;
    }

    .section li {
      margin-bottom: 8px;
    }

    .section a {
      color: var(--accent2);
    }

    .highlight {
      background: rgba(124, 92, 252, 0.12);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 14px 18px;
      margin: 14px 0;
      font-size: 14px;
      color: var(--text);
    }

    [dir="rtl"] .highlight {
      border-left: none;
      border-right: 3px solid var(--accent);
      border-radius: 8px 0 0 8px;
    }

      // Security section
      security_p: {
        tr: 'Tüm oyun verileri cihazınızda yerel olarak saklanır; sunucularımıza iletilmez. Üçüncü taraf hizmet sağlayıcılar (Google AdMob) kendi güvenlik standartlarına sahiptir. Uygulama, karışık içerik (HTTP) bağlantılarına izin vermez; yalnızca HTTPS kullanılır.',
        en: 'All game data is stored locally on your device and is not transmitted to our servers. Third-party providers (Google AdMob) maintain their own security standards. The app does not allow mixed content (HTTP) connections; only HTTPS is used.',
        de: 'Alle Spieldaten werden lokal auf Ihrem Gerät gespeichert und nicht an unsere Server übertragen. Drittanbieter (Google AdMob) unterhalten ihre eigenen Sicherheitsstandards. Die App erlaubt keine gemischten Inhalte (HTTP); es wird ausschließlich HTTPS verwendet.',
        es: 'Todos los datos del juego se almacenan localmente en su dispositivo y no se transmiten a nuestros servidores. Los proveedores externos (Google AdMob) mantienen sus propios estándares de seguridad. La app no permite conexiones de contenido mixto (HTTP); solo se usa HTTPS.',
        fr: "Toutes les données du jeu sont stockées localement sur votre appareil et ne sont pas transmises à nos serveurs. Les fournisseurs tiers (Google AdMob) maintiennent leurs propres normes de sécurité. L'application n'autorise pas les connexions à contenu mixte (HTTP) ; seul HTTPS est utilisé.",

        ru: 'Все игровые данные хранятся локально на вашем устройстве и не передаются на наши серверы. Сторонние поставщики (Google AdMob) соблюдают собственные стандарты безопасности. Приложение не допускает смешанного контента (HTTP); используется только HTTPS.',

        ko: '모든 게임 데이터는 기기에 로컬 저장되며 서버에 전송되지 않습니다. 제3자 제공업체(Google AdMob)는 자체 보안 기준을 유지합니다. 앱은 혼합 콘텐츠(HTTP) 연결을 허용하지 않으며 HTTPS만 사용합니다.',

      contact_label: {

    // ── Render ─────────────────────────────────────────────────────────────────
    let currentLang = 'en';

    function t(key) {
      const entry = T[key];
      if (!entry) return key;
      return entry[currentLang] || entry['en'] || key;
    }

    function buildLangBar() {
      const bar = document.getElementById('lang-bar');
      bar.innerHTML = '';
      LANGS.forEach(code => {
        const btn = document.createElement('button');
        btn.className = 'lang-btn' + (code === currentLang ? ' active' : '');
        btn.textContent = LANG_FLAGS[code] + ' ' + LANG_NAMES[code];
        btn.onclick = () => setLang(code);
        bar.appendChild(btn);
      });
    }

    function ul(items) {
      return '<ul>' + items.map(i => `<li>${i}</li>`).join('') + '</ul>';
    }

    function section(icon, titleKey, bodyHTML) {
      return `
    <div class="section">
      <h2><span class="icon">${icon}</span> ${t(titleKey)}</h2>
      ${bodyHTML}
    </div>`;
    }

    function buildContent() {
      const lang = currentLang;
      document.getElementById('h-title').textContent = t('page_title');
      document.documentElement.setAttribute('lang', lang);
      document.documentElement.setAttribute('dir', RTL.includes(lang) ? 'rtl' : 'ltr');
      document.title = `${t('page_title')} – Flow Sort: Color Tube Puzzle | Hexlume Games`;

      const adsLinks = T.ads_links[lang] || T.ads_links['en'];

      document.getElementById('content').innerHTML = [

        section('📋', 's_overview_title', `
      <p>${t('overview_p1')}</p>
      <p>${t('last_updated')}</p>
      <div class="highlight">${t('overview_highlight')}</div>
    `),

        section('👤', 's_collect_title', `
      <p>${t('collect_no_title')}</p>
      ${ul(T.collect_no_items[lang] || T.collect_no_items['en'])}
      <p style="margin-top:14px">${t('collect_local_title')}</p>
      ${ul(T.collect_local_items[lang] || T.collect_local_items['en'])}
    `),

        section('📣', 's_ads_title', `
      <p>${t('ads_p1')}</p>
      ${ul(T.ads_items[lang] || T.ads_items['en'])}
      <p style="margin-top:14px">${adsLinks[0]}<a href="https://policies.google.com/privacy" target="_blank">policies.google.com/privacy</a></p>
      <p>${adsLinks[1]}<a href="https://adssettings.google.com" target="_blank">adssettings.google.com</a></p>
    `),

        section('🌍', 's_gdpr_title', `
      <p>${t('gdpr_p1')}</p>
      ${ul(T.gdpr_items[lang] || T.gdpr_items['en'])}
    `),

        section('🔒', 's_security_title', `
      <p>${t('security_p')}</p>
    `),

        section('👶', 's_children_title', `
      <p>${t('children_p')}</p>
      <div class="highlight">${t('children_highlight')}</div>
    `),

        section('📜', 's_rights_title', `
      <p>${t('rights_p')}</p>
      ${ul(T.rights_items[lang] || T.rights_items['en'])}
      <p style="margin-top:14px">${t('rights_contact')}<a href="mailto:hexlume.games@gmail.com">hexlume.games@gmail.com</a></p>
      <p>${t('rights_uninstall')}</p>
    `),

        section('🔗', 's_links_title', `
      <p>${t('links_p')}</p>
    `),

        section('✏️', 's_changes_title', `
      <p>${t('changes_p')}</p>
    `),

        section('📬', 's_contact_title', `
      <p><strong>Hexlume Games</strong><br>
      ${t('contact_label')} <a href="mailto:hexlume.games@gmail.com">hexlume.games@gmail.com</a></p>
    `)

      ].join('');
    }

    function setLang(lang) {
      if (!LANGS.includes(lang)) return;
      currentLang = lang;
      buildLangBar();
      buildContent();
      // Scroll lang button into view on mobile
      const activeBtn = document.querySelector('.lang-btn.active');
      if (activeBtn) activeBtn.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
    }

    // ── Auto-detect language ───────────────────────────────────────────────────
    (function init() {
      // Check URL hash first (e.g. #tr)
      const hash = location.hash.replace('#', '');
      if (LANGS.includes(hash)) { currentLang = hash; }
      else {
        // Try browser language
        const nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase().split('-')[0];
        if (LANGS.includes(nav)) currentLang = nav;
        else currentLang = 'en';
      }
      buildLangBar();
      buildContent();
    })();
  </script>
</body>
